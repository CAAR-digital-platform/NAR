<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAAR — Online Insurance Subscription</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/header-extras.css"/>
</head>
<body>

<!-- ===== HEADER ===== -->
<div id="site-header"></div>


<!-- ===== HERO SECTION ===== -->

<section class="caar-hero">
    <img src="img/fleche.png" class="hero-deco" alt="" aria-hidden="true"/>
  <div class="caar-hero__inner">
    <div class="caar-hero__text">
      <span class="caar-hero__tag" data-i18n="online.products_tag">Online products</span>
      <h1 class="caar-hero__title" data-i18n="online.protect_title">Protect what matters most</h1>
      <p class="caar-hero__subtitle" data-i18n-html="true" data-i18n="online.protect_subtitle">Subscribe to our certified insurance policies in minutes.<br>
        Secure payment, instant proof of coverage.</p>
    </div>
    <div class="caar-hero__image"><img src="img/onlinefam.webp" alt="Online Insurance Illustration"/></div>
  </div>
</section>

<!-- ===== PRODUCTS SECTION ===== -->
<section class="products-online">
  <div class="products-online-inner">

    <div class="products-online-header">
      <h2 class="products-online-title" data-i18n="online.available_online_title">Our products are available online.</h2>
      <div class="products-online-divider">
        <span class="products-online-divider-dot"></span>
      </div>
    </div>

    <div class="products-online-grid" id="homepageProductsGrid">
      <p class="products-online-state" data-i18n="online.loading">Loading online products...</p>
    </div><!-- /grid -->
  </div>
</section>



<div id="site-footer"></div>


<script src="js/app-state.js"></script>
<script src="js/auth.js"></script>
<script src="js/access-guard.js"></script>
<script src="js/header-controller.js"></script>
<script src="js/main.js"></script>
<script src="js/animations.js"></script>

</body>
</html>
