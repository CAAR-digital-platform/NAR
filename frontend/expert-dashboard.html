<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="expert.title">CAAR — Expert Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #E8761E;
      --orange-dark: #c9601a;
      --bg: #f6f2ec;
      --card: #ffffff;
      --ink: #1d1d1d;
      --muted: #707070;
      --line: #e8dfd5;
      --ok: #207f49;
      --err: #bf3f2f;
      --purple: #7c3aed;
      --blue: #1f5ea8;
      --pending: #6b7280;
      --reported: #c46a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 8% 10%, #ffe6cb 0, transparent 28%), var(--bg);
    }
    .wrap { max-width: 1260px; margin: 0 auto; padding: 22px 18px 28px; }

    .top {
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:14px;
    }
    .top h1 {
      margin:0;
      font-family:'Playfair Display', serif;
      font-size:1.54rem;
    }
    .top p { margin:3px 0 0; color:var(--muted); font-size:.86rem; }

    .btn {
      border:0;
      border-radius:9px;
      font-weight:700;
      padding:10px 14px;
      cursor:pointer;
      font-family:inherit;
      font-size:.8rem;
      display:inline-flex;
      align-items:center;
      gap:7px;
    }
    .btn-orange { background:var(--orange); color:#fff; }
    .btn-orange:hover { background:var(--orange-dark); }
    .btn-light { background:#fff; border:1px solid var(--line); }

    .api-msg {
      display:none;
      margin-bottom:10px;
      border-radius:10px;
      padding:10px 12px;
      font-size:.8rem;
      font-weight:600;
    }
    .api-msg.ok { display:block; background:#eaf8ef; color:#1e7c45; border:1px solid #caebd6; }
    .api-msg.err { display:block; background:#fff2f1; color:#b53c2d; border:1px solid #ffd7d2; }

    .stats {
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:10px;
      margin-bottom:14px;
    }
    .stat {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 13px;
      min-height:84px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .stat:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(20, 14, 10, .08);
      border-color: #dfd0c1;
    }
    .stat-meta { min-width: 0; }
    .stat .l { color:var(--muted); font-size:.73rem; }
    .stat .v { margin-top:6px; font-size:1.2rem; font-weight:800; }
    .stat-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fdf4ea;
      color: var(--orange-dark);
      flex-shrink: 0;
    }

    .layout {
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:14px;
    }

    .panel {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
    }
    .panel-head {
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .panel-head h2 {
      margin:0;
      font-size:.94rem;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .panel-body { padding:12px 14px; }

    .claims-grid {
      display:grid;
      gap:9px;
      max-height:560px;
      overflow:auto;
      padding-right:2px;
    }
    .claim-card {
      border:1px solid #f0e8de;
      border-radius:11px;
      background:#fff;
      padding:10px 11px;
      display:grid;
      gap:8px;
    }
    .claim-card-head {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .claim-card-id {
      font-size:.76rem;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.01em;
    }
    .claim-client {
      font-size:.82rem;
      font-weight:700;
      display:flex;
      align-items:center;
      gap:6px;
    }
    .claim-email {
      color:var(--muted);
      font-size:.75rem;
      margin-top:2px;
    }
    .claim-desc {
      font-size:.78rem;
      color:#3f3f3f;
      line-height:1.45;
      border-top:1px solid #f5eee7;
      padding-top:8px;
    }

    .status {
      display:inline-flex;
      align-items:center;
      gap:5px;
      padding:2px 9px;
      border-radius:999px;
      font-size:.69rem;
      border:1px solid transparent;
      text-transform:capitalize;
      font-weight:700;
    }
    .status.status--pending { color: var(--pending); background:#f2f4f7; border-color:#d8dee6; }
    .status.status--under_review { color: var(--blue); background:#eef5ff; border-color:#cde0ff; }
    .status.status--expert_assigned { color: var(--purple); background:#f4efff; border-color:#e2d5ff; }
    .status.status--reported { color: var(--reported); background:#fff4e7; border-color:#ffd9ac; }
    .status.status--approved,
    .status.status--closed { color:#207f49; background:#eaf9f0; border-color:#c5f0d5; }
    .status.status--rejected { color:#bf3f2f; background:#fff1ef; border-color:#ffd4d0; }

    .empty-state {
      padding: 20px 12px;
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      border: 1px dashed #e8dfd5;
      border-radius: 10px;
      background: #fcfaf8;
    }

    .field { margin-bottom:10px; }
    .field label {
      display:flex;
      align-items:center;
      gap:6px;
      margin-bottom:5px;
      font-size:.75rem;
      font-weight:700;
      color:#464646;
    }
    .field input,
    .field textarea,
    .field select {
      width:100%;
      border:1px solid var(--line);
      border-radius:9px;
      padding:9px 10px;
      font-size:.8rem;
      font-family:inherit;
      background:#fff;
    }
    .field textarea { min-height:94px; resize:vertical; }

    .section-title {
      margin: 0 0 8px;
      font-size: .76rem;
      font-weight: 800;
      color: #6a6a6a;
      text-transform: uppercase;
      letter-spacing: .03em;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .inline {
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .availability-toggle {
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      padding:4px;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .availability-toggle input { display:none; }
    .availability-switch {
      width:46px;
      height:24px;
      border-radius:999px;
      background:#ddd3c8;
      position:relative;
      transition:background .18s ease;
      cursor:pointer;
    }
    .availability-switch::after {
      content:'';
      width:18px;
      height:18px;
      border-radius:50%;
      background:#fff;
      position:absolute;
      top:3px;
      left:3px;
      transition:left .18s ease;
      box-shadow:0 1px 2px rgba(0,0,0,.2);
    }
    .availability-toggle input:checked + .availability-switch {
      background:#3da465;
    }
    .availability-toggle input:checked + .availability-switch::after {
      left:25px;
    }
    .availability-state {
      font-size:.77rem;
      font-weight:700;
      color:#5b5b5b;
      min-width:72px;
    }

    .no-claims-msg {
      display: none;
      margin-bottom: 10px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: .8rem;
      font-weight: 600;
      color: #7d4f00;
      background: #fff6e7;
      border: 1px solid #ffe0ad;
    }

    @media (max-width: 980px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 data-i18n="expert.workspace.title">Expert Workspace</h1>
        <p data-i18n="expert.workspace.subtitle">Review assigned claims, submit reports, and manage your availability.</p>
      </div>
      <div class="inline">
        <button class="btn btn-light" id="expertRefresh"><span data-icon="refresh"></span><span data-i18n="expert.actions.refresh">Refresh</span></button>
        <button class="btn btn-light" id="expertHome"><span data-icon="home"></span><span data-i18n="expert.actions.public_site">Public Site</span></button>
        <button class="btn btn-orange" id="expertLogout"><span data-icon="logout"></span><span data-i18n="expert.actions.logout">Logout</span></button>
      </div>
    </div>

    <div class="api-msg" id="expertApiMsg"></div>

    <section class="stats">
      <article class="stat"><div class="stat-meta"><div class="l" data-i18n="expert.stats.assigned_claims">Assigned Claims</div><div class="v" id="esAssigned">-</div></div><span class="stat-icon" data-icon="fileText"></span></article>
      <article class="stat"><div class="stat-meta"><div class="l" data-i18n="expert.stats.in_progress">In Progress</div><div class="v" id="esProgress">-</div></div><span class="stat-icon" data-icon="activity"></span></article>
      <article class="stat"><div class="stat-meta"><div class="l" data-i18n="expert.stats.completed">Completed</div><div class="v" id="esCompleted">-</div></div><span class="stat-icon" data-icon="checkCircle"></span></article>
      <article class="stat"><div class="stat-meta"><div class="l" data-i18n="expert.stats.reports_submitted">Reports Submitted</div><div class="v" id="esReports">-</div></div><span class="stat-icon" data-icon="send"></span></article>
    </section>

    <section class="layout">
      <article class="panel">
        <div class="panel-head">
          <h2><span data-icon="fileText"></span><span data-i18n="expert.claims.title">Assigned Claims</span></h2>
        </div>
        <div class="panel-body">
          <div class="claims-grid" id="expertClaimsCards"></div>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head"><h2><span data-icon="send"></span><span data-i18n="expert.report.title">Submit Expert Report</span></h2></div>
        <div class="panel-body">
          <div class="no-claims-msg" id="noClaimsMsg" data-i18n="expert.report.no_assigned_ready">No assigned claims ready for report submission</div>

          <p class="section-title"><span data-icon="toggleOn"></span><span data-i18n="expert.availability.title">Availability</span></p>
          <div class="field">
            <label for="expertAvailabilityToggle" data-i18n="expert.availability.status">Status</label>
            <div class="inline">
              <label class="availability-toggle" for="expertAvailabilityToggle">
                <input id="expertAvailabilityToggle" type="checkbox" />
                <span class="availability-switch"></span>
                <span class="availability-state" id="availabilityStateLabel" data-i18n="expert.availability.busy">Busy</span>
              </label>
            </div>
          </div>

          <p class="section-title"><span data-icon="fileText"></span><span data-i18n="expert.report.claim_context">Claim Context</span></p>
          <div class="field">
            <label for="reportClaimSelect"><span data-icon="fileText"></span><span data-i18n="expert.report.assigned_claim">Assigned Claim</span></label>
            <select id="reportClaimSelect">
              <option value="" data-i18n="expert.report.select_assigned_claim">Select assigned claim...</option>
            </select>
          </div>

          <p class="section-title"><span data-icon="activity"></span><span data-i18n="expert.report.assessment_details">Assessment Details</span></p>
          <div class="field">
            <label for="reportValue"><span data-icon="fileText"></span><span data-i18n="expert.report.report_label">Report (Text or Filename)</span></label>
            <input id="reportValue" type="text" placeholder="e.g. report-claim-7.pdf or short summary" data-i18n-placeholder="expert.report.report_placeholder"/>
          </div>
          <div class="field">
            <label for="reportDate"><span data-icon="calendar"></span><span data-i18n="expert.report.report_date">Report Date</span></label>
            <input id="reportDate" type="date"/>
          </div>
          <div class="field">
            <label for="reportDamage"><span data-icon="money"></span><span data-i18n="expert.report.estimated_damage">Estimated Damage (DZD)</span></label>
            <input id="reportDamage" type="number" min="0.01" step="0.01" placeholder="e.g. 120000" data-i18n-placeholder="expert.report.damage_placeholder"/>
          </div>
          <div class="field">
            <label for="reportConclusion"><span data-icon="checkCircle"></span><span data-i18n="expert.report.conclusion">Conclusion</span></label>
            <select id="reportConclusion">
              <option value="covered" data-i18n="expert.report.covered">covered</option>
              <option value="not_covered" data-i18n="expert.report.not_covered">not_covered</option>
            </select>
          </div>
          <div class="field">
            <label for="reportDetails"><span data-icon="fileText"></span><span data-i18n="expert.report.report_details">Report Details</span></label>
            <textarea id="reportDetails" placeholder="Provide detailed technical assessment and recommendations..." data-i18n-placeholder="expert.report.details_placeholder"></textarea>
          </div>
          <button class="btn btn-orange" id="submitReportBtn"><span data-icon="send"></span><span data-i18n="expert.report.submit">Submit</span></button>
        </div>
      </article>
    </section>
  </div>

  <script src="js/app-state.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/icon-system.js"></script>
  <script src="js/expert-dashboard.js"></script>
</body>
</html>
